name: Update industries

on:
  schedule:
    # 每月 1 號 01:00 UTC = 09:00 Asia/Taipei
    - cron: '0 1 1 * *'
  # 允許在 Actions 頁面手動觸發
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      # 為了 commit 回 main(若有變動)
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch industries from TWSE / TPEx
        run: node scripts/fetch-industries.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet src/data/industries.json; then
            echo "industries.json 無變動,結束"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/industries.json
          git commit -m "chore(industries): monthly auto-update [skip ci]"
          git push
