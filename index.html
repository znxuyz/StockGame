<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <!-- index.html 不快取(只 ~2KB),確保部署新版後 Safari 不會用舊 HTML
         指向被 cleanupOutdatedCaches 清掉的舊 JS/CSS hash → 白屏。
         這個 meta 只影響 index.html 本身,不影響 SW 對 JS/CSS/asset 的快取策略 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- 新 favicon(九尾狐 PNG)。SVG 舊版 icon.svg 已不再用,留檔以備不時之需 -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#efe6cf" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="神獸股市" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <title>山海經股票養成 · 神獸股市</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
