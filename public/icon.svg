<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="神獸股市">
  <!-- 米紙底色(maskable 用,Android 會自動裁圓/裁圓角) -->
  <rect width="512" height="512" fill="#efe6cf"/>

  <!-- 外圈淡色印章邊(裝飾,被裁掉也無妨) -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#c8332a" stroke-width="3" opacity="0.35"/>

  <!-- 朱紅印章主體(實心圓,落在 maskable safe area 內) -->
  <circle cx="256" cy="256" r="180" fill="#c8332a"/>

  <!-- 內側白邊(印章碰邊感) -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="#efe6cf" stroke-width="4"/>

  <!-- 「獸」字白色 -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
    font-family="'Noto Serif TC','Songti TC','PingFang TC',serif"
    font-size="240" font-weight="900" fill="#efe6cf">獸</text>
</svg>
